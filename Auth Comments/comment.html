<!DOCTYPE html>
<html lang="en">
<head>
    <title>Comment System</title>
    <style>
        .comment-box { border: 1px solid #ccc; padding: 10px; margin: 10px 0; border-radius: 5px; }
        #comment-list { margin-top: 20px; }
    </style>
</head>
<body>

    <h2>Leave a Comment</h2>
    <!-- Input Form -->
    <form id="comment-form">
        <textarea id="comment-input" placeholder="Write a comment..." required cols="40" rows="4"></textarea><br>
        <button type="submit">Post Comment</button>
    </form>

    <h3>All Comments</h3>
    <!-- Container where comments will appear -->
    <div id="comment-list"></div>

    <button id="uuid-btn">Generate UUID</button>
    <p>ID: <span id="uuid-display">None</span></p>
    <script src="uuid.js"></script>
    <script src="index.js" defer></script>
</body>
</html>
