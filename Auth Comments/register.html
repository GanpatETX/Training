<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Form</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <form id="registerForm" class="reg">
        <h2>Register Page</h2>
        <br>
        <div class="email">
            <label for="reg-email">Enter Your Email</label>
            <!-- Changed type to email and id to reg-email -->
            <input type="email" id="reg-email" name="email" required>
        </div>
        <br>
        <div class="password">
            <label for="reg-password">Enter your Password : </label>
            <input type="password" id="reg-password" name="pass" required>
        </div>
        <br>
        <button type="submit" class="btn">Register</button>
        <br>
        <span>Have an account? <a href="index.html">Log in</a></span>
    </form>


    <script src="index.js"></script>
</body>

</html>
